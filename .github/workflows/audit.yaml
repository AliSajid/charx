name: Security Audit
on:
  schedule:
    - cron: 0 0 1,15 * *
  push:
    branches:
      - "*"
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
  workflow_dispatch:
permissions: read-all
jobs:
  security_audit:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443 index.crates.io:443 mise-versions.jdx.dev:80 mise.jdx.dev:443 objects.githubusercontent.com:443 static.crates.io:443 static.rust-lang.org:443 release-assets.githubusercontent.com

      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Setup mise-en-place
        uses: jdx/mise-action@e79ddf65a11cec7b0e882bedced08d6e976efb2d # v3.6.2
        with:
          install: true
          experimental: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Security Audit
        run: cargo-audit audit
