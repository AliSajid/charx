name: Semantic Release
on:
  workflow_call:
    inputs:
      new_release:
        description: "Whether or not a new release needs to be published"
        type: boolean
      new_release_version:
        description: "Whether or not a new release needs to be published"
        type: string
      prerelease:
        description: "Whether or not a new release needs to be published"
        type: boolean
  workflow_dispatch:
    inputs:
      new_release:
        description: "Whether or not a new release needs to be published"
        type: boolean
      new_release_version:
        description: "Whether or not a new release needs to be published"
        type: string
      prerelease:
        description: "Whether or not a new release needs to be published"
        type: boolean
env:
  RUST_BACKTRACE: 1
concurrency:
  group: ${{ github.workflow }}
permissions:
  contents: read
jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.new_release }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup mise-en-place
        uses: jdx/mise-action@e79ddf65a11cec7b0e882bedced08d6e976efb2d # v3.6.2
        with:
          install: true
          experimental: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@e89d40939c28e39f97cf32126055eeae86ba74ec # v6.3.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_KEY_PASSPHRASE }}
          fingerprint: ${{ secrets.GPG_SUBKEY_FINGERPRINT }}
          trust_level: 5
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_tag_gpgsign: false
          git_committer_name: ${{ vars.GIT_AUTHOR_NAME }}
          git_committer_email: ${{ vars.GIT_AUTHOR_EMAIL }}
      - name: Test GPG Key Import
        run: gpg --list-keys --keyid-format LONG
      - name: Set prerelease flag if necessary
        id: prerelease_flag
        if: ${{inputs.prerelease}}
        run: echo "prerelease_flag='--pre'" >>"$GITHUB_OUTPUT"
      - name: Bump the version
        run: echo cog bump --auto ${{ steps.outputs.prerelease_flag }}
        shell: bash
