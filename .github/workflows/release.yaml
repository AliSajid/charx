name: Semantic Release
on:
  workflow_call:
    inputs:
      new_release:
        description: "Whether or not a new release needs to be published"
        type: boolean
      prerelease:
        description: "Is this a prerelease?"
        type: boolean
  workflow_dispatch:
    inputs:
      new_release:
        description: "Whether or not a new release needs to be published"
        type: boolean
      prerelease:
        description: "Is this a prerelease?"
        type: boolean
env:
  RUST_BACKTRACE: 1
concurrency:
  group: ${{ github.workflow }}
permissions:
  contents: write
jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    if: ${{ inputs.new_release }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup mise-en-place
        uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0
        with:
          install: true
          experimental: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_KEY_PASSPHRASE }}
          fingerprint: ${{ secrets.GPG_SUBKEY_FINGERPRINT }}
          trust_level: 5
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_tag_gpgsign: false
          git_committer_name: ${{ vars.GIT_AUTHOR_NAME }}
          git_committer_email: ${{ vars.GIT_AUTHOR_EMAIL }}
      - name: Set prerelease flag if necessary
        id: prerelease_flag
        if: ${{inputs.prerelease}}
        run: echo "prerelease_flag=--pre" >>"$GITHUB_OUTPUT"
      - name: Get the next version number
        run: echo "NEXT_VERSION=$(cog bump --dry-run --auto ${{ steps.prerelease_flag.outputs.prerelease_flag }})" >>"$GITHUB_ENV"
      - name: Bump the version
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.SEMREL_CRATES_IO }}
        run: cog bump --auto ${{ steps.prerelease_flag.outputs.prerelease_flag }} --skip-ci
        shell: bash
      - name: Generate the Changelog
        run: cog changelog --at ${{ env.NEXT_VERSION }} | tee RELEASE_NOTES
      - name: Create a GitHub release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          body_path: RELEASE_NOTES
          prerelease: ${{inputs.prerelease}}
          name: v${{env.NEXT_VERSION}}
          tag_name: v${{env.NEXT_VERSION}}
