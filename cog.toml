from_latest_tag = true
ignore_merge_commits = true
ignore_fixup_commits = true
disable_changelog = false
disable_bump_commit = false
branch_whitelist = []
skip_ci = "[skip ci]"
skip_untracked = false
tag_prefix = "v"
pre = "next.*"


pre_bump_hooks = [
    "echo cargo set-version {{current_version}}",
    "cargo check --release",
]

post_bump_hooks = [
    "git push",
    "git push origin {{current_version}}",
    "cargo publish --dry-run",
]


[changelog]
path = "CHANGELOG.md"
authors = []

[bump_profiles]
